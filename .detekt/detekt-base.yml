# Global detekt configuration for TodoistIA KMP project.
# Formatting is handled by ktlint -- disabled here to avoid conflicts.

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  CyclomaticComplexMethod:
    active: true
    threshold: 15
  LargeClass:
    active: true
    threshold: 600
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 6
    constructorThreshold: 8
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 15
    thresholdInEnums: 10

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  SuspendFunSwallowedCancellation:
    active: true
  SuspendFunWithCoroutineScopeReceiver:
    active: true

empty-blocks:
  active: true

exceptions:
  active: true
  NotImplementedDeclaration:
    active: true
  PrintStackTrace:
    active: true
  SwallowedException:
    active: true
    allowedExceptionNameRegex: "_|(ignore|expected).*"
  ThrowingExceptionsWithoutMessageOrCause:
    active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - "ArrayIndexOutOfBoundsException"
      - "Error"
      - "IllegalMonitorStateException"
      - "IndexOutOfBoundsException"
      - "NullPointerException"
      - "RuntimeException"
  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    excludes: ["**/test/**", "**/androidTest/**"]
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
  TopLevelPropertyNaming:
    active: true
    constantPattern: "[A-Z][_A-Z0-9]*"

performance:
  active: true
  SpreadOperator:
    active: true
  UnnecessaryPartOfBinaryExpression:
    active: true

potential-bugs:
  active: true
  DoubleMutabilityForCollection:
    active: true
  ExitOutsideMain:
    active: true
  HasPlatformType:
    active: true
  ImplicitDefaultLocale:
    active: true
  UnnecessaryNotNullOperator:
    active: true
  UnnecessarySafeCall:
    active: true
  UselessPostfixExpression:
    active: true

style:
  active: true
  ForbiddenComment:
    active: true
    comments:
      - "FIXME:"
      - "STOPSHIP:"
      - "HACK:"
    allowedPatterns: "TODO:"
  MagicNumber:
    active: true
    excludes: ["**/test/**", "**/androidTest/**"]
    ignoreNumbers:
      - "-1"
      - "0"
      - "1"
      - "2"
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  MaxLineLength:
    active: false  # Handled by ktlint
  ReturnCount:
    active: true
    max: 3
    excludeReturnFromLambda: true
  ThrowsCount:
    active: true
    max: 2
  UnusedImports:
    active: false  # Handled by ktlint
  UnusedPrivateMember:
    active: true
    allowedNames: "(_|ignored|expected|serialVersionUID)"
  UseCheckOrError:
    active: true
  UseRequire:
    active: true
  WildcardImport:
    active: false  # Handled by ktlint